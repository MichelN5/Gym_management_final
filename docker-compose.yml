services:
  backend:
    build:
      context: ./django_gym_management
    environment:
      DJANGO_SECRET_KEY: dev-only-change-me
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: 127.0.0.1,localhost,backend
      CORS_ALLOWED_ORIGINS: http://127.0.0.1:5173,http://localhost:5173
      DJANGO_SUPERUSER_USERNAME: admin
      DJANGO_SUPERUSER_EMAIL: admin@example.com
      DJANGO_SUPERUSER_PASSWORD: admin12345
    ports:
      - "8000:8000"
    volumes:
      - ./django_gym_management:/app

  frontend:
    build:
      context: ./gym-management-main
    environment:
      VITE_API_URL: http://127.0.0.1:8000
      VITE_GRAPHQL_URL: http://127.0.0.1:8000/graphql/
    ports:
      - "5173:5173"
    volumes:
      - ./gym-management-main:/app
      - /app/node_modules
    depends_on:
      - backend
